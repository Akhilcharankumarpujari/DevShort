version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: techhub-db-dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - dev-db-data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    image: python:3.11-slim
    container_name: techhub-api-gateway-dev
    restart: always
    working_dir: /app
    volumes:
      - ../api-gateway:/app
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=TechHub API Gateway
      - ENV=development
      - LOG_LEVEL=INFO
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - INVENTORY_SERVICE_URL=http://inventory-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - user-service
      - product-service
      - order-service
      - inventory-service
      - payment-service

  user-service:
    image: python:3.11-slim
    container_name: techhub-user-service-dev
    restart: always
    working_dir: /app
    volumes:
      - ../user-service:/app
    ports:
      - "8001:8000"
    environment:
      - PROJECT_NAME=TechHub User Service
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/techhub_users
      - ENV=development
      - LOG_LEVEL=INFO
      - SECRET_KEY=8810df66a3ea68a8dc4e7a8848f02931a54160de4698de29b222959828d9c6c5
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    command: >
      sh -c "pip install -r requirements.txt &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy

  product-service:
    image: python:3.11-slim
    container_name: techhub-product-service-dev
    restart: always
    working_dir: /app
    volumes:
      - ../product-service:/app
    ports:
      - "8002:8000"
    environment:
      - PROJECT_NAME=TechHub Product Service
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/techhub_products
      - ENV=development
      - LOG_LEVEL=INFO
      - SECRET_KEY=8810df66a3ea68a8dc4e7a8848f02931a54160de4698de29b222959828d9c6c5
      - ALGORITHM=HS256
    command: >
      sh -c "pip install -r requirements.txt &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy

  order-service:
    image: python:3.11-slim
    container_name: techhub-order-service-dev
    restart: always
    working_dir: /app
    volumes:
      - ../order-service:/app
    ports:
      - "8003:8000"
    environment:
      - PROJECT_NAME=TechHub Order Service
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/techhub_orders
      - ENV=development
      - LOG_LEVEL=INFO
      - SECRET_KEY=8810df66a3ea68a8dc4e7a8848f02931a54160de4698de29b222959828d9c6c5
      - ALGORITHM=HS256
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - INVENTORY_SERVICE_URL=http://inventory-service:8000
    command: >
      sh -c "pip install -r requirements.txt &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy

  inventory-service:
    image: python:3.11-slim
    container_name: techhub-inventory-service-dev
    restart: always
    working_dir: /app
    volumes:
      - ../inventory-service:/app
    ports:
      - "8004:8000"
    environment:
      - PROJECT_NAME=TechHub Inventory Service
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/techhub_inventory
      - ENV=development
      - LOG_LEVEL=INFO
      - SECRET_KEY=8810df66a3ea68a8dc4e7a8848f02931a54160de4698de29b222959828d9c6c5
      - ALGORITHM=HS256
    command: >
      sh -c "pip install -r requirements.txt &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy

  payment-service:
    image: python:3.11-slim
    container_name: techhub-payment-service-dev
    restart: always
    working_dir: /app
    volumes:
      - ../payment-service:/app
    ports:
      - "8005:8000"
    environment:
      - PROJECT_NAME=TechHub Payment Service
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/techhub_payments
      - ENV=development
      - LOG_LEVEL=INFO
      - SECRET_KEY=8810df66a3ea68a8dc4e7a8848f02931a54160de4698de29b222959828d9c6c5
      - ALGORITHM=HS256
      - ORDER_SERVICE_URL=http://order-service:8000
    command: >
      sh -c "pip install -r requirements.txt &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: techhub-frontend-dev
    restart: always
    working_dir: /app
    volumes:
      - ../frontend:/app
      # Avoid overwriting container node_modules with host node_modules
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: npm run dev
    depends_on:
      - api-gateway

volumes:
  dev-db-data:
