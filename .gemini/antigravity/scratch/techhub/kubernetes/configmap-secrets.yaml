apiVersion: v1
kind: ConfigMap
metadata:
  name: techhub-config
  namespace: default
data:
  ENV: "production"
  LOG_LEVEL: "INFO"
  API_V1_STR: "/api/v1"
  USER_SERVICE_URL: "http://user-service:8000"
  PRODUCT_SERVICE_URL: "http://product-service:8000"
  ORDER_SERVICE_URL: "http://order-service:8000"
  INVENTORY_SERVICE_URL: "http://inventory-service:8000"
  PAYMENT_SERVICE_URL: "http://payment-service:8000"
---
apiVersion: v1
kind: Secret
metadata:
  name: techhub-secrets
  namespace: default
type: Opaque
stringData:
  # In production, these should be generated securely or injected via a Vault/Secrets Manager
  POSTGRES_PASSWORD: "postgres-prod-password-secure-123"
  SECRET_KEY: "prod-jwt-secret-key-change-me-in-production-123!"
  DATABASE_URL_USERS: "postgresql://postgres:postgres-prod-password-secure-123@postgres:5432/techhub_users"
  DATABASE_URL_PRODUCTS: "postgresql://postgres:postgres-prod-password-secure-123@postgres:5432/techhub_products"
  DATABASE_URL_ORDERS: "postgresql://postgres:postgres-prod-password-secure-123@postgres:5432/techhub_orders"
  DATABASE_URL_INVENTORY: "postgresql://postgres:postgres-prod-password-secure-123@postgres:5432/techhub_inventory"
  DATABASE_URL_PAYMENTS: "postgresql://postgres:postgres-prod-password-secure-123@postgres:5432/techhub_payments"
