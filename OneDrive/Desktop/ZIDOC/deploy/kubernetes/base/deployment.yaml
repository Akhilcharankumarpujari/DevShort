apiVersion: apps/v1
kind: Deployment
metadata:
  name: zidoc-service
  labels:
    app: zidoc-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zidoc-service
  template:
    metadata:
      labels:
        app: zidoc-service
    spec:
      containers:
        - name: service
          image: zidoc-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: zidoc-config
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
