version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: zidoc-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: zidoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zidoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zidoc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: zidoc-api
    ports:
      - "8080:8080"
    environment:
      ZIDOC_SERVER_ENV: development
      ZIDOC_DATABASE_HOST: db
      ZIDOC_DATABASE_PORT: 5432
      ZIDOC_DATABASE_USER: postgres
      ZIDOC_DATABASE_PASSWORD: postgrespassword
      ZIDOC_DATABASE_DBNAME: zidoc
      ZIDOC_REDIS_HOST: redis
      ZIDOC_REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: zidoc-ai-service
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    depends_on:
      - api

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: zidoc-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
