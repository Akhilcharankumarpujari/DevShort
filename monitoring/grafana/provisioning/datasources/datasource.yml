# =============================================================================
# Grafana Datasource Provisioning — Prometheus
# Automatically configures the Prometheus datasource on first start.
# No manual configuration required.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "30s"
      httpMethod: "GET"
      exemplarTraceIdDestinations: []
